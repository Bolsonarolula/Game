<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
    }
    
    .mobile-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 10px;
      z-index: 1000;
      pointer-events: none;
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
    }
    
    .control-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    
    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 10px;
      font-family: 'Press Start 2P', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.1s, transform 0.1s;
    }
    
    .control-btn:active, .control-btn.active {
      background: rgba(129, 140, 248, 0.7);
      transform: scale(0.95);
    }
    
    .control-btn.attack-btn {
      width: 70px;
      height: 70px;
      background: rgba(239, 68, 68, 0.5);
      border-color: rgba(239, 68, 68, 0.8);
    }
    
    .control-btn.attack-btn:active, .control-btn.attack-btn.active {
      background: rgba(239, 68, 68, 0.8);
    }
    
    .control-btn.jump-btn {
      background: rgba(34, 197, 94, 0.5);
      border-color: rgba(34, 197, 94, 0.8);
    }
    
    .control-btn.jump-btn:active, .control-btn.jump-btn.active {
      background: rgba(34, 197, 94, 0.8);
    }
    
    .player-label {
      color: white;
      font-size: 8px;
      text-align: center;
      margin-bottom: 5px;
      text-shadow: 1px 1px 2px black;
    }
    
    .player1-controls .player-label {
      color: #818cf8;
    }
    
    .player2-controls .player-label {
      color: #f87171;
    }
    
    @media (min-width: 769px) {
      .mobile-controls {
        display: none;
      }
    }
    
    @media (max-width: 768px) {
      canvas {
        width: 100vw !important;
        height: auto !important;
      }
    }
  </style>
</head>
<body>
  <!-- red container div -->
  <div style="position: relative; display: inline-block">
    <!-- smaller red container div -->
    <div
      style="
        position: absolute;
        display: flex;
        width: 100%;
        align-items: center;
        padding: 20px;
      "
    >
      <!-- player health -->
      <div
        style="
          position: relative;
          width: 100%;
          display: flex;
          justify-content: flex-end;
          border-top: 4px solid white;
          border-left: 4px solid white;
          border-bottom: 4px solid white;
        "
      >
        <div style="background-color: red; height: 30px; width: 100%"></div>
        <div
          id="playerHealth"
          style="
            position: absolute;
            background: #818cf8;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
          "
        ></div>
      </div>

      <!-- timer -->
      <div
        id="timer"
        style="
          background-color: black;
          width: 100px;
          height: 50px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          border: 4px solid white;
        "
      >
        10
      </div>
      <!-- enemy health -->
      <div
        style="
          position: relative;
          width: 100%;
          border-top: 4px solid white;
          border-bottom: 4px solid white;
          border-right: 4px solid white;
        "
      >
        <div style="background-color: red; height: 30px"></div>
        <div
          id="enemyHealth"
          style="
            position: absolute;
            background: #818cf8;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
          "
        ></div>
      </div>
      <div></div>
    </div>
    <div
      id="displayText"
      style="
        position: absolute;
        color: white;
        align-items: center;
        justify-content: center;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        display: none;
      "
    >
      Tie
    </div>
    <canvas></canvas>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <!-- Player 1 Controls (Left side) -->
    <div class="control-group player1-controls">
      <div class="player-label">P1</div>
      <div class="control-row">
        <button class="control-btn jump-btn" id="p1-jump">PULAR</button>
      </div>
      <div class="control-row">
        <button class="control-btn" id="p1-left">&#9664;</button>
        <button class="control-btn attack-btn" id="p1-attack">ATK</button>
        <button class="control-btn" id="p1-right">&#9654;</button>
      </div>
    </div>
    
    <!-- Player 2 Controls (Right side) -->
    <div class="control-group player2-controls">
      <div class="player-label">P2</div>
      <div class="control-row">
        <button class="control-btn jump-btn" id="p2-jump">PULAR</button>
      </div>
      <div class="control-row">
        <button class="control-btn" id="p2-left">&#9664;</button>
        <button class="control-btn attack-btn" id="p2-attack">ATK</button>
        <button class="control-btn" id="p2-right">&#9654;</button>
      </div>
    </div>
  </div>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"
    integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script src="js/utils.js"></script>
  <script src="js/classes.js"></script>
  <script src="index.js"></script>
</body>
